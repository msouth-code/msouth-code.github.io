        // Your beautiful D3 code will go here
        var dataset;  //Declare global variable, initially empty (undefined)

        var margin = { top: 50, right: 30, bottom: 70, left: 60 },
            width = 760 - margin.left - margin.right,
            height = 900 - margin.top - margin.bottom;

        // append the svg object to the body of the page
        var svg = d3.select("#my_dataviz")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform",
                "translate(" + margin.left + "," + margin.top + ")");

        // Shared tooltip for all cells
        const tooltip = d3.select("body")
            .append("div")
            .attr("class", "tooltip")
            .style("position", "absolute")
            .style("background", "white")
            .style("padding", "5px")
            .style("border", "1px solid #ccc")
            .style("pointer-events", "none")
            .style("opacity", 0);

        // Column offsets
        var col1Offset = width * (1/3);
        var col2Offset = width * (2/3);
        var cellWidth = (width - 80) * (1/3);

        d3.csv("../data/coffee.csv").then(function (data) {
            dataset = data;
            // Row 0
            drawChart1();
            drawChart2();
            drawChart3();
            // Row 1
            drawChart4();
            drawChart5();
            drawChart6();
            // Row 2
            drawChart7();
            drawChart8();
            drawChart9();

        // CELL 1: FLAVOR V FLAVOR (Row 0, Col 0)
        function drawChart1() {
            var xMin = d3.min(dataset, function (d) { return +d["Data.Scores.Flavor"] })
            var xMax = d3.max(dataset, function (d) { return +d["Data.Scores.Flavor"] })
            var x = d3.scaleLinear()
                .range([0, cellWidth])
                .domain([xMin, xMax])
            svg.append("g")
                .attr("transform", "translate(0," + height * 1/4 + ")")
                .call(d3.axisBottom(x))
                .selectAll("text")
                .attr("transform", "translate(-10,0)rotate(-45)")
                .style("text-anchor", "end");

            var yMin = d3.min(dataset, function (d) { return +d["Data.Scores.Flavor"] })
            var yMax = d3.max(dataset, function (d) { return +d["Data.Scores.Flavor"] })
            var y = d3.scaleLinear()
                .domain([yMin, yMax])
                .range([height * (1/4), 0]);
            svg.append("g")
                .call(d3.axisLeft(y));

            svg.selectAll(".cell1")
                .data(dataset)
                .enter()
                .append("circle")
                .attr("class", "cell1")
                .attr("cx", function (d) { return x(d["Data.Scores.Flavor"]); })
                .attr("cy", function (d) { return y(d["Data.Scores.Flavor"]); })
                .attr("r", 2)
                .attr("fill", function(d) {
                    if(d["Data.Type.Species"] == "Arabica") {
                        return "#eb3434";
                    } else {
                        return "#096b26";
                    }
                })
                .style("opacity", 0.5)
                .on("mouseover", (evt, d) => {
                    tooltip
                        .style("opacity", 1)
                        .html(`Flavor Score: ${d["Data.Scores.Flavor"]} <br/>
                        Species: ${d["Data.Type.Species"]}`)
                        .style("left", (evt.pageX + 10) + "px")
                        .style("top", (evt.pageY - 10) + "px");
                })
                .on("mouseout", () => {
                     tooltip.style("opacity", 0);
                });

            //y label
            svg.append("text")
            .attr("text-anchor", "middle")
            .attr("transform", "rotate(-90)")
            .attr("y", (-margin.left + 20))
            .attr("x", -(height*(1/8)))
            .text("Flavor Score");
        }
