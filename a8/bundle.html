<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A8 - Edge Bundling</title>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <script src="https://d3js.org/d3.v7.min.js" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js" integrity="sha512-wNH6xsp2n8CfB91nrBtfc4sfLwYPBMjSWVUwQOp60AYYXH6i8yCwuKFZ4rgK2i6pQek/b+bSyR7b01/922IBzQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>


</head>

<body>
    <a href="../index.html">Back</a>
    <div></div>
    <div id="my_dataviz"></div>
    <script type="text/javascript">
        // Your beautiful D3 code will go here
    

    const width = 954;                                                                                          
      const radius = width / 2;                                                                                   
      const colornone = "#ccc";                                                                                   
      const colorin = "#00f";                                                                                     
      const colorout = "#f00";                                                                                    
                                                                                                                  
      const tree = d3.cluster()                                                                                   
          .size([2 * Math.PI, radius - 100]);                                                                     
                                                                                                                  
      const line = d3.lineRadial()                                                                                
          .curve(d3.curveBundle.beta(0.85))                                                                       
          .radius(d => d.y)                                                                                       
          .angle(d => d.x);                                                                                       
                                                                                                                  
      function bilink(root) {                                                                                     
          const map = new Map(root.leaves().map(d => [d.data.id, d]));                                            
          for (const d of root.leaves()) {                                                                        
              d.incoming = [];                                                                                    
              d.outgoing = d.data.targets.map(i => [d, map.get(i)]).filter(([, target]) => target);               
          }                                                                                                       
          for (const d of root.leaves()) {                                                                        
              for (const o of d.outgoing) {                                                                       
                  if (o[1]) o[1].incoming.push(o);                                                                
              }                                                                                                   
          }                                                                                                       
          return root;                                                                                            
      }                                                                                                           
                                                                                                                  
      // Load and process the CSV data                                                                            
      d3.csv("../data/fb_pages_artist.csv").then(function(data) {                                                             
          const allNodes = [...new Set(data.flatMap(d => [d.source, d.target]))].slice(0, 50);                    
          const nodeSet = new Set(allNodes);                                                                      
          const filteredLinks = data.filter(d => nodeSet.has(d.source) && nodeSet.has(d.target));                 
                                                                                                                  
          const linkMap = new Map();                                                                              
          allNodes.forEach(node => linkMap.set(node, []));                                                        
          filteredLinks.forEach(d => {                                                                            
              if (linkMap.has(d.source)) {                                                                        
                  linkMap.get(d.source).push(d.target);                                                           
              }                                                                                                   
          });                                                                                                     
                                                                                                                 
          const hierarchyData = {                                                                                 
              id: "",                                                                                             
              children: allNodes.map(node => ({                                                                   
                  id: node,                                                                                       
                  targets: linkMap.get(node) || []                                                                
              }))                                                                                                 
          };                                                                                                      
                                                                                                                 
          const root = tree(bilink(d3.hierarchy(hierarchyData)                                                    
              .sort((a, b) => d3.ascending(a.height, b.height) || d3.ascending(a.data.id, b.data.id))));          
                                                                                                                 
          const svg = d3.select("#my_dataviz")                                                                    
              .append("svg")                                                                                      
              .attr("width", width)                                                                               
              .attr("height", width)                                                                              
              .attr("viewBox", [-width / 2, -width / 2, width, width])                                            
              .attr("style", "max-width: 100%; height: auto;");                                                   
                                                                                                                  
          const node = svg.append("g")                                                                            
              .attr("font-family", "sans-serif")                                                                  
              .attr("font-size", 10)                                                                              
              .selectAll("g")                                                                                     
              .data(root.leaves())                                                                                
              .join("g")                                                                                          
              .attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`)                  
              .append("text")                                                                                     
              .attr("dy", "0.31em")                                                                               
              .attr("x", d => d.x < Math.PI ? 6 : -6)                                                             
              .attr("text-anchor", d => d.x < Math.PI ? "start" : "end")                                          
              .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)                                      
              .text(d => d.data.id)                                                                               
              .each(function(d) { d.text = this; })                                                               
              .on("mouseover", overed)                                                                            
              .on("mouseout", outed)                                                                              
              .call(text => text.append("title").text(d => `${d.data.id}                                          
                ${d.outgoing.length} outgoing                                                                                   
                ${d.incoming.length} incoming`));                                                                               
                                                                                                                  
          const link = svg.append("g")                                                                            
              .attr("stroke", colornone)                                                                          
              .attr("fill", "none")                                                                               
              .selectAll("path")                                                                                  
              .data(root.leaves().flatMap(leaf => leaf.outgoing))                                                 
              .join("path")                                                                                       
              .style("mix-blend-mode", "multiply")                                                                
              .attr("d", ([i, o]) => line(i.path(o)))                                                             
              .each(function(d) { d.path = this; });                                                              
                                                                                                                 
          function overed(event, d) {                                                                             
              link.style("mix-blend-mode", null);                                                                 
              d3.select(this).attr("font-weight", "bold");                                                        
              d3.selectAll(d.incoming.map(d => d.path)).attr("stroke", colorin).raise();                          
              d3.selectAll(d.incoming.map(([d]) => d.text)).attr("fill", colorin).attr("font-weight", "bold");    
              d3.selectAll(d.outgoing.map(d => d.path)).attr("stroke", colorout).raise();                         
              d3.selectAll(d.outgoing.map(([, d]) => d.text)).attr("fill", colorout).attr("font-weight", "bold"); 
          }                                                                                                       
                                                                                                                  
          function outed(event, d) {                                                                              
              link.style("mix-blend-mode", "multiply");                                                           
              d3.select(this).attr("font-weight", null);                                                          
              d3.selectAll(d.incoming.map(d => d.path)).attr("stroke", null);                                     
              d3.selectAll(d.incoming.map(([d]) => d.text)).attr("fill", null).attr("font-weight", null);         
              d3.selectAll(d.outgoing.map(d => d.path)).attr("stroke", null);                                     
              d3.selectAll(d.outgoing.map(([, d]) => d.text)).attr("fill", null).attr("font-weight", null);       
          }                                                                                                       
      }); 


    </script>
</body>

</html>
